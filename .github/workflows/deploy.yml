name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Ganti dengan master jika cabang utama Anda bernama master

# Mengatur izin GITHUB_TOKEN untuk mengizinkan penyebaran langsung ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Izinkan hanya satu deployment simultan berjalan
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
